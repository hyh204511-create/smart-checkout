    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errorMsg = `前端运行时异常！\n\n错误信息: ${message}\n发生位置: 第 ${lineno} 行`;
            alert(errorMsg);
            
            window.addEventListener('DOMContentLoaded', () => {
                const msgBox = document.getElementById('offline-msg');
                if(msgBox) {
                    msgBox.innerHTML = `
                        <i class="fa fa-times-circle" style="font-size: 48px; color: #ef4444; margin-bottom: 16px;"></i>
                        <p style="color:#ef4444; font-weight:bold; font-size:16px;">系统初始化失败</p>
                        <p style="color:#fca5a5; font-size:12px; max-width: 80%; text-align:center;">${message}</p>
                    `;
                    msgBox.style.display = 'flex';
                }
            });
            return false;
        };
    </script>

    <script>
        let currentWeight = 0.0;
        let cartItems = [];

        // ================= 新增：自动识别状态机变量 =================
        let lastWeight = 0.0;          // 记录上一次的重量 (kg)
        let stableCounter = 0;         // 稳定计数器
        let hasAutoDetected = false;   // 状态锁：当前商品是否已识别过
        const STABLE_THRESHOLD = 3;    // 稳定几次后触发 (你的轮询是500ms，3次即1.5秒)
        const MIN_WEIGHT_KG = 0.010;   // 最小触发重量：10克 (滤除风吹或托盘微震)
        const ERROR_MARGIN_KG = 0.005; // 允许的抖动误差：5克以内视为稳定
 // ============================================================

         window.addEventListener('load', function() {
            console.log("页面资源加载完毕，准备连接设备...");
            setTimeout(initVideoStream, 800);
            $('#scale-icon-bg').addClass('blue');
            $('#scale-icon').css('color', '#3b82f6');
            setInterval(pollWeight, 500);
        });

        // ========== WebSocket 视频流 (USB UVC + CPU 编码, 低延迟) ==========
        let videoWs = null;
        let wsReconnectTimer = null;
        let useWsFallback = false;

        // ========== GPU 加速视频渲染 (createImageBitmap + requestAnimationFrame) ==========
        // v2.2: 跳过 Blob→ArrayBuffer→Blob 来回转换，Blob 直传 createImageBitmap
        let pendingFrame = null;       // 类型: Blob (直接来自 WebSocket, 零拷贝)
        let fpsFrames = 0;
        let fpsLastTime = performance.now();
        let renderCanvas = null;
        let renderCtx = null;

        function updateFpsDisplay() {
            const now = performance.now();
            fpsFrames++;
            if (now - fpsLastTime >= 1000) {
                var fps = Math.round(fpsFrames * 1000 / (now - fpsLastTime));
                document.getElementById('fps-display').textContent = fps + ' FPS';
                fpsFrames = 0;
                fpsLastTime = now;
            }
        }

        function ensureCanvas() {
            if (renderCtx) return;
            var canvas = document.getElementById('video-canvas');
            if (!canvas) {
                canvas = document.createElement('canvas');
                canvas.id = 'video-canvas';
                canvas.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                var cameraBox = document.querySelector('.camera-box');
                if (cameraBox) cameraBox.appendChild(canvas);
            }
            renderCanvas = canvas;
            renderCtx = canvas.getContext('2d');
        }

        function videoRenderLoop() {
            if (pendingFrame) {
                // 直接拿 Blob，不经过 ArrayBuffer 中转
                var blob = pendingFrame;
                pendingFrame = null;
                // createImageBitmap 原生接受 Blob，零额外拷贝
                createImageBitmap(blob, { resizeWidth: 1280, resizeHeight: 720, resizeQuality: 'high' }).then(function(bitmap) {
                    ensureCanvas();
                    if (renderCanvas.width !== bitmap.width || renderCanvas.height !== bitmap.height) {
                        renderCanvas.width = bitmap.width;
                        renderCanvas.height = bitmap.height;
                    }
                    renderCtx.drawImage(bitmap, 0, 0);
                    bitmap.close();
                    updateFpsDisplay();
                }).catch(function() {
                    // 极少数不支持 resize 的浏览器降级
                    ensureCanvas();
                });
            }
            requestAnimationFrame(videoRenderLoop);
        }
        requestAnimationFrame(videoRenderLoop);

        function initVideoStream() {
            // WebSocket + GPU Canvas 渲染 (优先)
            connectWebSocket();
        }

        function connectWebSocket() {
            if (useWsFallback) return;  // 已降级到 MJPEG

            const img = document.getElementById('camera-stream');
            const msg = document.getElementById('offline-msg');
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + location.hostname + ':8765';

            try {
                videoWs = new WebSocket(wsUrl);
                videoWs.binaryType = 'blob';

                videoWs.onopen = () => {
                    console.log('🔌 WebSocket 视频已连接 (GPU加速)');
                    var canvas = document.getElementById('video-canvas');
                    if (canvas) canvas.style.display = 'block';
                    var img = document.getElementById('camera-stream');
                    if (img) img.style.display = 'none';
                    msg.style.display = 'none';
                    if (wsReconnectTimer) {
                        clearTimeout(wsReconnectTimer);
                        wsReconnectTimer = null;
                    }
                };

                videoWs.onmessage = (event) => {
                    if (event.data instanceof Blob) {
                        pendingFrame = event.data;
                    }
                };

                videoWs.onerror = () => {
                    console.warn('⚠️ WebSocket 连接失败, 降级到 MJPEG');
                    fallbackToMjpeg();
                };

                videoWs.onclose = () => {
                    console.log('🔌 WebSocket 已断开');
                    if (!useWsFallback) {
                        // 3 秒后尝试重连
                        wsReconnectTimer = setTimeout(connectWebSocket, 3000);
                    }
                };
            } catch (e) {
                console.warn('⚠️ WebSocket 不可用, 降级到 MJPEG');
                fallbackToMjpeg();
            }
        }

        function fallbackToMjpeg() {
            useWsFallback = true;
            if (videoWs) {
                try { videoWs.close(); } catch (e) {}
                videoWs = null;
            }
            if (wsReconnectTimer) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }

            var canvas = document.getElementById('video-canvas');
            if (canvas) canvas.style.display = 'none';

            var img = document.getElementById('camera-stream');
            var msg = document.getElementById('offline-msg');

            img.style.display = 'block';
            img.src = "/api/video_feed/?" + new Date().getTime();

            img.onload = () => {
                img.style.display = 'block';
                msg.style.display = 'none';
            };

            img.onerror = () => {
                img.style.display = 'none';
                msg.innerHTML = '<i class="fa fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5; color: #ef4444;"></i><p>摄像头连接中断</p><small>尝试重连中...</small>';
                msg.style.display = 'flex';
                setTimeout(() => { img.src = "/api/video_feed/?" + new Date().getTime(); }, 3000);
            };
        }

        /* templates/index.html */

function pollWeight() {
    $.get('/api/get-weight/', function(res) {
        if (res.success) {
            let kg = res.raw_gram / 1000.0;
            currentWeight = kg;
            $('#weight-val').text(kg.toFixed(3));

            // 核心逻辑集成：负重预警反馈 (原有的UI逻辑)
            if (kg < 0) {
                $('#weight-val').css({'color': '#ef4444', 'text-shadow': '0 0 10px rgba(239,68,68,0.3)'});
            } else {
                $('#weight-val').css({'color': '#4ade80', 'text-shadow': '0 0 10px rgba(74,222,128,0.3)'});
            }

            $('#scale-icon-bg').removeClass('red blue').addClass('green');
            $('#scale-icon').css('color', '#22c55e');
            $('#com-status').text('已连接').css('color', '#334155');

            // ================= 核心：自动识别状态机 =================
            // 状态 1：物品被拿走（重量低于 10g），重置所有状态
            if (kg < MIN_WEIGHT_KG) {
                hasAutoDetected = false;  // 解锁，为下个商品做准备
                stableCounter = 0;        // 计数器清零
            }
            // 状态 2：重量达标，且当前物品还没被识别过
            else if (kg >= MIN_WEIGHT_KG && !hasAutoDetected) {
                
                // 判断：本次重量与上次重量差距是否在 5g 误差范围内？
                if (Math.abs(kg - lastWeight) <= ERROR_MARGIN_KG) {
                    stableCounter++; // 重量稳定，计数+1
                } else {
                    stableCounter = 0; // 发生跳变（说明手还在放东西），重新计时
                }

                // 状态 3：连续稳定达到阈值（1.5秒），触发识别！
                if (stableCounter >= STABLE_THRESHOLD) {
                    hasAutoDetected = true; // 马上上锁，防止下一次轮询重复触发
                    console.log("🟢 重量已稳定，自动触发商品识别...");
                    
                    // 等同于用户手动点击了“识别商品”按钮
                    identifyProduct(); 
                }
            }
            
            // 更新最后一次重量，供下次比对
            lastWeight = kg; 
            // ========================================================
        }
    }).fail(function() {
        $('#scale-icon-bg').removeClass('green blue').addClass('red');
        $('#scale-icon').css('color', '#ef4444');
        $('#com-status').text('连接断开').css('color', '#ef4444');
    });
}
        function tareScale() {
            $.post('/api/tare/', function(res) {
                if(res.success) {
                    const Toast = Swal.mixin({toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                    Toast.fire({icon: 'success', title: '归零成功'});
                    $('#weight-val').text('0.000');
                } else {
                    Swal.fire({icon:'error', title:'操作失败', text:res.error});
                }
            });
        }

        // ========== 手动参数调节 (滑块实时生效) ==========
        const paramDefs = {
            'exposure_absolute': {label: '曝光', elem: 'ctrl-exposure_absolute', val: 'val-exposure_absolute'},
            'sharpness':         {label: '锐度', elem: 'ctrl-sharpness',         val: 'val-sharpness'},
            'brightness':        {label: '亮度', elem: 'ctrl-brightness',        val: 'val-brightness'},
            'contrast':          {label: '对比度', elem: 'ctrl-contrast',         val: 'val-contrast'},
            'saturation':        {label: '饱和度', elem: 'ctrl-saturation',       val: 'val-saturation'},
        };
        let paramDebounceTimers = {};

        function onParamChange(name, rawValue) {
            const val = parseInt(rawValue);
            document.getElementById(paramDefs[name].val).textContent = val;
            // 防抖: 松手 150ms 后发送 (避免拖动时频繁请求)
            if (paramDebounceTimers[name]) clearTimeout(paramDebounceTimers[name]);
            paramDebounceTimers[name] = setTimeout(() => {
                $.ajax({
                    url: '/api/camera-params/',
                    type: 'POST',
                    contentType: 'application/json',  // ← 必须! DRF 需要此头解析 JSON
                    data: JSON.stringify({name: name, value: val}),
                    success: function(res) {
                        if (res.success) {
                            document.getElementById(paramDefs[name].val).textContent = res.value;
                        }
                    },
                    error: function() {
                        console.warn('参数设置失败:', name);
                    }
                });
            }, 150);
        }

        // 首次加载同步硬件参数到滑块 (仅一次)
        function loadCurrentParams() {
            $.get('/api/camera-params/', function(res) {
                if (res.success && res.params) {
                    for (const [name, info] of Object.entries(res.params)) {
                        const def = paramDefs[name];
                        if (!def) continue;
                        const v = info.value;
                        document.getElementById(def.elem).value = v;
                        document.getElementById(def.val).textContent = v;
                    }
                }
                if (res.sharpness !== undefined) {
                    updateSharpnessDisplay(res.sharpness);
                }
            });
        }
        setTimeout(loadCurrentParams, 600);

        // 仅轮询清晰度 (不碰滑块)
        setInterval(function() {
            $.get('/api/camera-sharpness/', function(res) {
                if (res.success) updateSharpnessDisplay(res.sharpness);
            });
        }, 1000);

        function updateSharpnessDisplay(score) {
            const el = document.getElementById('sharpness-display');
            if (!el) return;
            const s = score.toFixed(0);
            el.textContent = '清晰度 ' + s;
            el.className = 'fps-counter';  // reset
            if (score >= 50)       el.classList.add('sharpness-good');
            else if (score >= 20)  el.classList.add('sharpness-ok');
            else                   el.classList.add('sharpness-bad');
        }

        function identifyProduct() {
            // 核心逻辑集成：严谨拦截负重并予提示
            if (currentWeight < 0) {
                Swal.fire('哎呀', '当前秤盘是负重状态哦，请先点击【去皮归零】把秤调平吧~', 'warning');
                return;
            }

            const btn = $('#btn-detect');
            const originalHtml = btn.html();
            btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 思考中...');

            $.post('/api/detect/onnx/', function(res) {
                if (res.success && res.products.length > 0) {
                    // 按名称去重：同一商品保留置信度最高的
                    const uniqueMap = {};
                    res.products.forEach(p => {
                        if (!uniqueMap[p.name] || uniqueMap[p.name].confidence < p.confidence) {
                            uniqueMap[p.name] = p;
                        }
                    });
                    const uniqueProducts = Object.values(uniqueMap);

                    if (uniqueProducts.length === 1) {
                        addToCart(uniqueProducts[0]);
                        // TTS 语音播报
                        $.post('/api/send-tts/', {text: '[v16]识别到' + uniqueProducts[0].name});
                        const Toast = Swal.mixin({toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                        Toast.fire({icon: 'success', title: '一眼认出: ' + uniqueProducts[0].name});
                    } else {
                        // 多个不同商品：弹窗选择 + 语音播报
                        $.post('/api/send-tts/', {text: '[v16]识别到多个商品，请选择'});
                        let optionsHtml = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">';
                        uniqueProducts.forEach((p, idx) => {
                            optionsHtml += `
                                <button onclick="selectProductFromModal(${idx})" style="padding:15px; border:1px solid #e2e8f0; border-radius:10px; background:#f8fafc; cursor:pointer; text-align:center; transition:0.2s;" onmouseover="this.style.background='#eff6ff'; this.style.borderColor='#3b82f6'" onmouseout="this.style.background='#f8fafc'; this.style.borderColor='#e2e8f0'">
                                    <div style="font-size:16px; font-weight:bold; color:#1e293b; margin-bottom:5px;">${p.name}</div>
                                    <div style="font-size:12px; color:#64748b;">可信度: ${(p.confidence*100).toFixed(1)}%</div>
                                </button>
                            `;
                        });
                        optionsHtml += '</div>';

                        window.tempDetectedProducts = uniqueProducts;

                        Swal.fire({
                            title: '发现多个宝贝 🍎',
                            html: '<p style="font-size:14px; color:#64748b;">小秤慧眼识珠，看到了好几个选项，请告诉我是哪一个：</p>' + optionsHtml,
                            showConfirmButton: false,
                            showCloseButton: true
                        });
                    }
                } else {
                    // 核心逻辑集成：识别盲区的人情味兜底引导
                    Swal.fire({
                        icon: 'info',
                        title: '哎呀，有点眼拙 🙈',
                        text: '这个宝贝长得太特别啦，我一时没认出来。能帮我翻个面，或者调整一下位置再试一次吗？',
                        confirmButtonText: '没问题，我调整下',
                        confirmButtonColor: '#3b82f6',
                        showCancelButton: true,
                        cancelButtonText: '没关系，清空重来',
                    });
                }
            })
            .fail(() => Swal.fire('呜呜', '我和大脑断开连接了 (服务超时，请检查网络)', 'error'))
            .always(() => btn.prop('disabled', false).html(originalHtml));
        }

        // 用于处理上述多产品网格选择请求的挂载函数
        function selectProductFromModal(idx) {
            Swal.close();
            if(window.tempDetectedProducts && window.tempDetectedProducts[idx]) {
                addToCart(window.tempDetectedProducts[idx]);
                const Toast = Swal.mixin({toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                Toast.fire({icon: 'success', title: '已确认: ' + window.tempDetectedProducts[idx].name});
            }
        }

        function addToCart(product) {
            let kg = currentWeight;
            if (kg <= 0) kg = 1.0;

            let price = parseFloat(product.price);
            let total = (kg * price).toFixed(2);
            cartItems.push({ name: product.name, weight: kg, price: price, total: total });
            renderCart();
        }

        function renderCart() {
            const list = $('#cart-list');
            list.empty();

            if (cartItems.length === 0) {
                list.html(`
                    <div class="empty-cart">
                        <i class="fa fa-inbox" style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                        <p>请将商品放置在秤盘上</p>
                    </div>`);
                $('#total-price').text('0.00');
                $('#btn-checkout').prop('disabled', true);
                return;
            }

            let grandTotal = 0;
            cartItems.forEach((item, idx) => {
                grandTotal += parseFloat(item.total);
                list.append(`
                    <div class="cart-item">
                        <div class="item-left">
                            <div class="item-icon">${item.name.charAt(0)}</div>
                            <div class="item-info">
                                <h5>${item.name}</h5>
                                <p>¥${item.price}/kg × ${item.weight.toFixed(3)}kg</p>
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="item-price">¥${item.total}</span>
                            <button class="btn-remove" onclick="removeItem(${idx})"><i class="fa fa-times"></i></button>
                        </div>
                    </div>
                `);
            });

            $('#total-price').text(grandTotal.toFixed(2));
            $('#btn-checkout').prop('disabled', false);

            const scrollContainer = document.getElementById('cart-list');
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
        }

        function removeItem(idx) {
            cartItems.splice(idx, 1);
            renderCart();
        }

        function clearCart() {
            if (cartItems.length > 0) {
                cartItems = [];
                renderCart();
            }
        }

        function checkout() {
            const total = $('#total-price').text();
            if (parseFloat(total) <= 0) return;

            const btn = $('#btn-checkout');
            const originalHtml = btn.html();
            btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 处理中...');

            $.ajax({
                url: '/api/create-order/',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ total_price: total, products_list: cartItems }),
                success: function(res) {
                    if (res.success) {
                        const params = new URLSearchParams({
                            orderId: res.order_id,
                            amount: total,
                            items: JSON.stringify(cartItems)
                        });
                        window.location.href = `/checkout/payment/?${params.toString()}`;
                    } else {
                        Swal.fire('错误', res.error, 'error');
                        btn.prop('disabled', false).html(originalHtml);
                    }
                }
            });
        }
    </script>
</body>
